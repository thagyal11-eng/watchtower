<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="520" rx="14" fill="#0b1120"/>
  <rect x="0.5" y="0.5" width="999" height="519" rx="14" fill="none" stroke="#1f2937"/>

  <!-- top bar -->
  <rect x="1" y="1" width="998" height="54" rx="14" fill="#0e1424"/>
  <rect x="14" y="13" width="30" height="30" rx="7" fill="#ffffff"/>
  <g transform="translate(20,18) scale(0.31)">
    <path d="M32 7.5 L52 25 H12 Z" fill="#d0584c"/><rect x="19.5" y="25" width="25" height="16" fill="#f3a25c"/>
    <rect x="12" y="41" width="40" height="13" fill="#fbe1c0"/><rect x="21" y="54" width="22" height="10" fill="#f3a25c"/>
    <g stroke="#0c2f6b" stroke-width="4" fill="none" stroke-linejoin="round"><path d="M32 7.5 L52 25 H12 Z"/><path d="M19.5 25 V41 H44.5 V25"/><rect x="12" y="41" width="40" height="13"/><path d="M21 54 V64 H43 V54"/></g>
  </g>
  <text x="54" y="33" font-size="16" font-weight="700" fill="#f1f5f9">Watchtower</text>
  <text x="360" y="33" font-size="13" font-weight="600" fill="#818cf8">Schedule</text>
  <rect x="360" y="42" width="58" height="2" rx="1" fill="#818cf8"/>
  <text x="446" y="33" font-size="13" fill="#94a3b8">Queues &amp; Jobs</text>
  <text x="572" y="33" font-size="13" fill="#94a3b8">Errors</text>
  <circle cx="952" cy="27" r="4" fill="#4ade80"/><text x="930" y="31" font-size="11" fill="#64748b" text-anchor="end">Live</text>

  <!-- summary tiles -->
  <g>
    <rect x="14" y="68" width="236" height="74" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect x="14" y="68" width="3" height="74" fill="#4ade80"/>
    <text x="30" y="92" font-size="11" font-weight="600" fill="#64748b">JOBS PROCESSED (24H)</text>
    <text x="30" y="124" font-size="28" font-weight="700" fill="#e5e7eb">1,284</text>

    <rect x="258" y="68" width="236" height="74" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect x="258" y="68" width="3" height="74" fill="#f87171"/>
    <text x="274" y="92" font-size="11" font-weight="600" fill="#64748b">FAILURES (24H)</text>
    <text x="274" y="124" font-size="28" font-weight="700" fill="#f87171">19</text>

    <rect x="502" y="68" width="236" height="74" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect x="502" y="68" width="3" height="74" fill="#fbbf24"/>
    <text x="518" y="92" font-size="11" font-weight="600" fill="#64748b">SCHEDULED TASKS</text>
    <text x="518" y="124" font-size="28" font-weight="700" fill="#e5e7eb">2 / 4</text>
    <text x="600" y="120" font-size="13" font-weight="700" fill="#fbbf24">2 missed!</text>

    <rect x="746" y="68" width="240" height="74" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect x="746" y="68" width="3" height="74" fill="#f87171"/>
    <text x="762" y="92" font-size="11" font-weight="600" fill="#64748b">UNRESOLVED ERRORS</text>
    <text x="762" y="124" font-size="28" font-weight="700" fill="#f87171">3</text>
  </g>

  <!-- table -->
  <rect x="14" y="158" width="972" height="346" rx="10" fill="#111827" stroke="#1f2937"/>
  <text x="30" y="186" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">COMMAND</text>
  <text x="380" y="186" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">CADENCE</text>
  <text x="620" y="186" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">LAST RUN</text>
  <text x="760" y="186" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1">STATUS</text>
  <line x1="30" y1="198" x2="970" y2="198" stroke="#1f2937"/>

  <!-- rows -->
  <g font-size="14">
    <text x="30" y="236" fill="#e5e7eb" font-family="monospace">send:digest</text>
    <text x="380" y="236" fill="#94a3b8">Daily at 06:00</text>
    <text x="620" y="236" fill="#94a3b8">2m ago</text>
    <rect x="760" y="222" width="78" height="22" rx="5" fill="#14331f"/><circle cx="775" cy="233" r="3" fill="#4ade80"/><text x="785" y="237" fill="#4ade80" font-size="11" font-weight="700">SUCCESS</text>
    <rect x="884" y="220" width="86" height="26" rx="6" fill="#0b1120" stroke="#312e81"/><text x="927" y="237" fill="#c7d2fe" font-size="12" text-anchor="middle">Run now</text>
    <line x1="30" y1="258" x2="970" y2="258" stroke="#1f2937"/>

    <!-- missed row -->
    <rect x="15" y="259" width="970" height="44" fill="#2a0f12"/>
    <rect x="15" y="259" width="3" height="44" fill="#f87171"/>
    <text x="30" y="287" fill="#e5e7eb" font-family="monospace">backup:run</text>
    <text x="380" y="287" fill="#94a3b8">Hourly</text>
    <text x="620" y="287" fill="#f87171">3d ago</text>
    <rect x="760" y="273" width="70" height="22" rx="5" fill="#3b1418"/><circle cx="775" cy="284" r="3" fill="#f87171"/><text x="785" y="288" fill="#f87171" font-size="11" font-weight="700">MISSED</text>
    <rect x="884" y="271" width="86" height="26" rx="6" fill="#0b1120" stroke="#312e81"/><text x="927" y="288" fill="#c7d2fe" font-size="12" text-anchor="middle">Run now</text>
    <line x1="30" y1="303" x2="970" y2="303" stroke="#1f2937"/>

    <text x="30" y="338" fill="#e5e7eb" font-family="monospace">cache:warm</text>
    <text x="380" y="338" fill="#94a3b8">Every 5 minutes</text>
    <text x="620" y="338" fill="#94a3b8">1m ago</text>
    <rect x="760" y="324" width="78" height="22" rx="5" fill="#14331f"/><circle cx="775" cy="335" r="3" fill="#4ade80"/><text x="785" y="339" fill="#4ade80" font-size="11" font-weight="700">SUCCESS</text>
    <rect x="884" y="322" width="86" height="26" rx="6" fill="#0b1120" stroke="#312e81"/><text x="927" y="339" fill="#c7d2fe" font-size="12" text-anchor="middle">Run now</text>
    <line x1="30" y1="360" x2="970" y2="360" stroke="#1f2937"/>

    <text x="30" y="395" fill="#e5e7eb" font-family="monospace">reports:build</text>
    <text x="380" y="395" fill="#94a3b8">Weekly on Monday</text>
    <text x="620" y="395" fill="#94a3b8">just now</text>
    <rect x="760" y="381" width="84" height="22" rx="5" fill="#102438"/><circle cx="775" cy="392" r="3" fill="#60a5fa"/><text x="785" y="396" fill="#60a5fa" font-size="11" font-weight="700">RUNNING</text>
    <rect x="884" y="379" width="86" height="26" rx="6" fill="#0b1120" stroke="#312e81"/><text x="927" y="396" fill="#c7d2fe" font-size="12" text-anchor="middle">Run now</text>
  </g>
</svg>
